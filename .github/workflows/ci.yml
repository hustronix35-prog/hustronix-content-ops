name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  voice-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run voice validation tests
        run: pytest tests/ -v

  carousel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install render dependencies
        run: python scripts/setup_carousel_env.py

      - name: Seed sample vault data
        run: python scripts/seed_vault.py

      - name: Validate brand + playwright
        run: python scripts/validate_carousel_setup.py

      - name: Generate carousel smoke test
        run: python scripts/generate_carousel.py --idea-id 3

      - name: Assert all PNGs rendered
        run: |
          python -c "
          import json
          from pathlib import Path
          m = json.loads(Path('assets/generated/3/manifest.json').read_text())
          assert m.get('render_complete') is True
          assert len(m['png_slides']) == m['slide_count']
          assert m['slide_count'] >= 6
          print('OK:', len(m['png_slides']), 'slides, quality=', m.get('quality'))
          "
